# Prometheus scrape + alerting config (N6.7). Mounted read-only into the
# prometheus container at /etc/prometheus/prometheus.yml. All targets are
# container names on blog.network; nothing here is published to the public
# interface. TODOs are box-specific values to confirm at provision time.
global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    host: blog

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - /etc/prometheus/rules.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: alertmanager
    static_configs:
      - targets: ["alertmanager:9093"]

  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: podman
    static_configs:
      - targets: ["podman-exporter:9882"]

  - job_name: litestream
    static_configs:
      - targets: ["litestream:9090"] # metrics addr enabled in litestream.yml

  # Blackbox probes the *public* URL through Caddy, so a dead app container (502)
  # or expiring cert is visible end-to-end, app-instrumentation-free.
  - job_name: blackbox-http
    metrics_path: /probe
    params:
      module: [https_2xx]
    static_configs:
      - targets:
          - https://jasonbirchall.dev # TODO confirm public URL
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
