# Blackbox exporter modules (N6.7). Mounted at /etc/blackbox/blackbox.yml.
# The https_2xx module probes the public URL over IPv4, expecting a 2xx and
# capturing the TLS cert expiry (probe_ssl_earliest_cert_expiry).
modules:
  https_2xx:
    prober: http
    timeout: 10s
    http:
      method: GET
      valid_status_codes: [] # defaults to 2xx
      fail_if_not_ssl: true
      preferred_ip_protocol: ip4
      ip_protocol_fallback: false
