# Alert rules. Mounted at /etc/prometheus/rules.yml. Deliberately small and
# actionable: a solo blog, one inbox, no on-call. Every rule here is either
# user-facing-broken or a leading indicator that needs a human — anything else is a
# dashboard, not an alert. Annotations carry the remediation command.
groups:
  - name: blog
    rules:
      # Dead man's switch: always firing. Alertmanager pings healthchecks.io every
      # minute; if Prometheus / Alertmanager / the box dies, the pings stop and
      # healthchecks alerts. This is what catches "the whole stack is down" — the
      # one failure Prometheus itself can't email about.
      - alert: Watchdog
        expr: vector(1)
        labels:
          severity: none
        annotations:
          summary: "Watchdog — always firing; its absence is the alert."

      # THE alert. The public site is not returning 2xx (covers Caddy and the app).
      # 2m absorbs the brief app restart at the end of a deploy.
      - alert: BlogDown
        expr: probe_success{job="blackbox-http"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "jasonbirchall.dev is DOWN (no 2xx for 2m)"
          description: >-
            Public probe failing. ssh blog; systemctl --user status caddy app;
            journalctl --user -u caddy -n 50.

      # A monitored component stopped being scraped — a container/exporter died. If
      # job=litestream, off-box replication (your backups) has stopped.
      - alert: TargetDown
        expr: up == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.job }} is down (not scrapeable for 5m)"
          description: >-
            ssh blog; systemctl --user status {{ $labels.job }}; podman ps.
            If job=litestream, off-box backups have paused.

      # Caddy auto-renews the cert; 14 days' warning means renewal is NOT happening.
      - alert: CertExpiringSoon
        expr: (probe_ssl_earliest_cert_expiry{job="blackbox-http"} - time()) < 14 * 86400
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "TLS cert expires in < 14 days"
          description: >-
            Caddy should auto-renew. journalctl --user -u caddy | grep -i acme.

      # Disk headroom: SQLite, the Litestream WAL, and on-box image builds all need
      # space; running out breaks deploys and can corrupt the DB.
      - alert: DiskFillingUp
        expr: |
          node_filesystem_avail_bytes{fstype=~"ext4|xfs|btrfs"}
            / node_filesystem_size_bytes{fstype=~"ext4|xfs|btrfs"} < 0.15
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "< 15% disk free on {{ $labels.mountpoint }}"
          description: >-
            ssh blog; podman image prune -f; du -sh ~/srv/blog ~/.local/share/containers.
