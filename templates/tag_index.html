{% extends "base.html" %}
{% block title %}Tags &middot; {{ site_name }}{% endblock %}
{% block content %}
  <h1>Tags</h1>
  {% if tags %}
  <ul class="tag-list">
    {% for tag in tags %}
    <li><a href="/tags/{{ tag.slug }}">{{ tag.slug }}</a> <span class="tag-count">{{ tag.count }}</span></li>
    {% endfor %}
  </ul>
  {% else %}
  <p>No tags yet.</p>
  {% endif %}
{% endblock %}
