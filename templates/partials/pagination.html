{% if page.has_other_pages %}
<nav class="pagination" aria-label="Pagination">
  {% if page.has_previous %}<a rel="prev" href="{% querystring page=page.previous_page_number %}">&larr; Newer</a>{% endif %}
  <span>Page {{ page.number }} of {{ page.paginator.num_pages }}</span>
  {% if page.has_next %}<a rel="next" href="{% querystring page=page.next_page_number %}">Older &rarr;</a>{% endif %}
</nav>
{% endif %}
