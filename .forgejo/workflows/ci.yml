# Continuous integration. Trunk-based: runs on every push to `main` (plus
# manual dispatch). A red `main` is fixed forward or reverted immediately.
name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:

# A newer push to the same ref cancels an in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Pin uv so CI is reproducible; bump deliberately alongside the dev tools.
  UV_VERSION: "0.11.17"

jobs:
  check:
    # Codeberg hosted runners use sized labels, not `docker`:
    # codeberg-tiny (2 min) / codeberg-small (5 min) / codeberg-medium (10 min).
    # small gives headroom for the CPython download + dependency install.
    # The default image (ghcr.io/catthehacker/ubuntu:act-latest) ships git and
    # curl, so no container override or apt step is needed.
    runs-on: codeberg-small
    steps:
      - name: Checkout
        uses: https://code.forgejo.org/actions/checkout@v4

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/${UV_VERSION}/install.sh | sh

      - name: Put uv on PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install dependencies (frozen)
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Type check (ty)
        run: uv run ty check

      - name: Tests (pytest)
        run: uv run pytest

      - name: Dependency audit (pip-audit)
        run: uv run pip-audit
