# Shift-left quality gates. Install once with `uv run pre-commit install`.
# Keep hook revs in sync with the pinned dev tools in pyproject.toml; bump with
# `uv run pre-commit autoupdate`.
default_language_version:
  python: python3.12

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.16
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
        exclude: '\.md$'
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: sops-encrypted
        name: ensure sops secrets files are encrypted
        entry: scripts/check-sops-encrypted.sh
        language: script
        files: '(^|/)secrets/.*\.sops\.ya?ml$'
        exclude: '\.example$'
